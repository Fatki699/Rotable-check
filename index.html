<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rotable Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 15px; }
        #status-bar { text-align: center; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .success { color: #34c759; border: 2px solid #34c759; }
        .error { color: #ff3b30; border: 2px solid #ff3b30; }
        #reader { background: black; border-radius: 16px; overflow: hidden; margin-bottom: 10px; }
        #result-card { display: none; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .label { color: #888; font-size: 0.9rem; }
        .value { color: #000; font-weight: 500; text-align: right; flex: 1; margin-left: 10px; }
        button { width: 100%; padding: 16px; background: #007aff; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; margin-top: 10px; }
        input { width: 100%; box-sizing: border-box; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 1rem; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="status-bar">🔄 正在連線數據...</div>
    <div id="reader"></div>
    <div id="manual-area">
        <input type="text" id="manual-id" placeholder="手動輸入 ID">
        <button onclick="searchAndShow(document.getElementById('manual-id').value)" style="background:#34c759;">查詢</button>
    </div>
    <div id="result-card">
        <h2 id="res-id" style="color:#007aff; margin:0 0 10px 0;"></h2>
        <div id="info-list"></div>
        <button onclick="location.reload()">重新掃描</button>
    </div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXRUvH5sxOhyAX7MNM7R7WqmdfGOkbBHeCRclGPZLyU17t7MJgQy7ctwAOR-tNH59SoEzib_I-9uwP/pub?output=csv";
let inventory = [];

function loadData() {
    Papa.parse(CSV_URL, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(r) {
            inventory = r.data;
            const b = document.getElementById('status-bar');
            if (inventory.length > 0) { b.innerText = "✅ 系統就緒"; b.className = "success"; }
            else { b.innerText = "⚠️ 試算表無資料"; b.className = "error"; }
        },
        error: function() { 
            document.getElementById('status-bar').innerText = "❌ 連線失敗"; 
            document.getElementById('status-bar').className = "error"; 
        }
    });
}

function searchAndShow(id) {
    const tid = id.trim().toUpperCase();
    const item = inventory.find(row => Object.values(row).some(v => String(v).trim().toUpperCase() === tid));
    if (item) {
        document.getElementById('res-id').innerText = tid;
        const list = document.getElementById('info-list');
        list.innerHTML = "";
        for (const [k, v] of Object.entries(item)) {
            list.innerHTML += `<div class="info-row"><span class="label">${k}</span><span class="value">${v || "-"}</span></div>`;
        }
        document.getElementById('reader').style.display = 'none';
        document.getElementById('manual-area').style.display = 'none';
        document.getElementById('result-card').style.display = 'block';
    } else { alert("找不到編號"); }
}

let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
scanner.render(s => searchAndShow(s));
loadData();
</script>
</body>
</html>
