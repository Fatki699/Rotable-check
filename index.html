### 下一步：還需要修改 Script 邏輯
只貼上面的 HTML 雖然會出現框框，但按了沒反應。請再往下捲動到代碼的最末端，找到 `function onScanSuccess` 之後的內容，**直接將最後的整個 `<script>` 部分替換為以下內容**：

```javascript
<script>
let CSV_URL = "你的CSV網址"; // 這裡記得保留你原本那串長網址
let inventory = [];

function loadData() {
    Papa.parse(CSV_URL, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            inventory = results.data;
            document.getElementById('status-bar').innerText = `✅ 系統就緒 (已載入 ${inventory.length} 筆)`;
            document.getElementById('status-bar').className = "success";
        }
    });
}

// 核心搜尋功能
function searchAndShow(id) {
    const targetID = id.trim().toUpperCase();
    const item = inventory.find(row => {
        return Object.values(row).some(val => String(val).trim().toUpperCase() === targetID);
    });

    if (item) {
        html5QrcodeScanner.clear(); 
        document.getElementById('res-id').innerText = targetID;
        document.getElementById('res-pn').innerText = item["Part Number"] || "-";
        document.getElementById('res-sn').innerText = item["Serial No"] || "-";
        document.getElementById('res-loc').innerText = item["Location"] || "-";
        document.getElementById('res-expiry').innerText = item["Expiry Date"] || "-";
        document.getElementById('res-owner').innerText = item["Owner"] || "-";
        
        // 隱藏掃描器和輸入框
        document.getElementById('reader').style.display = 'none';
        document.getElementById('manual-id').parentElement.style.display = 'none';
        document.getElementById('result-card').style.display = 'block';
    } else {
        alert("找不到編號: " + targetID);
    }
}

// 掃描成功時呼叫
function onScanSuccess(decodedText) {
    searchAndShow(decodedText);
}

// 按下查詢按鈕時呼叫
function manualSearch() {
    const input = document.getElementById('manual-id').value;
    if (input) searchAndShow(input);
    else alert("請先輸入編號");
}

let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
html5QrcodeScanner.render(onScanSuccess);
loadData();
</script>

<script>
// 使用你提供的最新正確連結
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXRUvH5sx0hyAX7MNM7R7WqmdfGOkbBHeCRclGPZLyU17t7MJgQy7ctwAOR-tNH59SoEzib_I-9uwP/pub?output=csv";

let inventory = [];

function loadData() {
    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            inventory = results.data;
            const bar = document.getElementById('status-bar');
            if (inventory.length > 0) {
                bar.innerText = `✅ 系統就緒 (已載入 ${inventory.length} 筆)`;
                bar.className = "success";
            } else {
                bar.innerText = "⚠️ 讀取成功但無資料，請檢查試算表內容";
                bar.className = "error";
            }
        },
        error: function() {
            document.getElementById('status-bar').innerText = "❌ 無法讀取資料，請檢查網路或發佈設定";
            document.getElementById('status-bar').className = "error";
        }
    });
}

function onScanSuccess(decodedText) {
    html5QrcodeScanner.clear();
    const scancode = decodedText.trim().toUpperCase();
    
    // 全文搜尋：只要試算表任何一格包含這個編號就抓出來
    const item = inventory.find(row => {
        return Object.values(row).some(val => String(val).trim().toUpperCase() === scancode);
    });

    if (item) {
        document.getElementById('res-id').innerText = "編號: " + scancode;
        const list = document.getElementById('details-list');
        list.innerHTML = ""; // 清空

        // 自動生成所有標題與對應內容
        for (let [key, value] of Object.entries(item)) {
            if (key && value && key.toLowerCase() !== "rotable id") {
                list.innerHTML += `
                    <div class="info-row">
                        <span class="label">${key}</span>
                        <span class="value">${value}</span>
                    </div>`;
            }
        }

        document.getElementById('reader').style.display = 'none';
        document.getElementById('result-card').style.display = 'block';
    } else {
        alert("找不到此編號: " + scancode);
        location.reload();
    }
}

// 啟動掃描器
let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
    fps: 15, 
    qrbox: 250,
    aspectRatio: 1.0
});
html5QrcodeScanner.render(onScanSuccess);

// 執行載入資料
loadData();
</script>
