<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotable 實時查詢系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        h1 { text-align: center; color: #333; font-size: 1.2rem; }
        #reader { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #loading-status { text-align: center; color: #666; margin-bottom: 10px; font-size: 0.9rem; padding: 10px; background: #fff; border-radius: 8px; }
        #result-card { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); margin-top: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .info-label { color: #666; font-weight: bold; font-size: 0.85rem; min-width: 100px; }
        .info-value { color: #000; text-align: right; flex: 1; margin-left: 10px; word-break: break-all; }
        button { width: 100%; padding: 15px; background: #007aff; color: white; border: none; border-radius: 8px; font-size: 1rem; margin-top: 20px; cursor: pointer; }
        .warning { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rotable 零件查詢 (Google 實時版)</h1>
    <div id="loading-status">正在同步試算表資料，請稍候...</div>
    
    <div id="reader"></div>

    <div id="result-card">
        <h2 id="res-id" style="margin-top:0; color: #007aff; border-bottom: 2px solid #007aff; padding-bottom: 5px;"></h2>
        <div class="info-row"><span class="info-label">Part Number</span><span class="info-value" id="res-pn"></span></div>
        <div class="info-row"><span class="info-label">Serial No</span><span class="info-value" id="res-sn"></span></div>
        <div class="info-row"><span class="info-label">Location</span><span class="info-value" id="res-loc"></span></div>
        <div class="info-row"><span class="info-label">Store</span><span class="info-value" id="res-store"></span></div>
        <div class="info-row"><span class="info-label">Expiry Date</span><span class="info-value" id="res-expiry"></span></div>
        <div class="info-row"><span class="info-label">Owner</span><span class="info-value" id="res-owner"></span></div>
        <div class="info-row"><span class="info-label">Project No</span><span class="info-value" id="res-project"></span></div>
        <button onclick="restartScan()">重新掃描</button>
    </div>
</div>

<script>
// 這裡已經填好了你的 API 網址
const API_URL = "https://script.google.com/macros/s/AKfycbwkz2YmeTwGcwgnwZEzT5l1OALl4QO9x64CHEZ3A2AwNIgzz3LS7Y5bkoSWudWZ0pkDHw/exec"; 

let inventory = [];

// 從 Google Sheet 抓取資料
async function loadData() {
    const statusEl = document.getElementById('loading-status');
    try {
        const response = await fetch(API_URL);
        inventory = await response.json();
        statusEl.innerText = `✅ 已成功讀取 ${inventory.length} 筆資料`;
        statusEl.style.color = "green";
    } catch (e) {
        statusEl.innerText = "❌ 資料同步失敗，請檢查網路或 API 部署設定";
        statusEl.style.color = "red";
        console.error(e);
    }
}

// 處理掃描結果
function onScanSuccess(decodedText) {
    // 停止掃描
    html5QrcodeScanner.clear();
    
    const id = decodedText.trim().toUpperCase();
    
    // 搜尋資料庫 (這裡對應你表格中的標題名稱)
    const item = inventory.find(i => {
        // 確保欄位名稱跟 Google Sheet 第一行完全一樣
        const rotableId = i["Rotable ID"] || i["RotableID"]; 
        return String(rotableId).trim().toUpperCase() === id;
    });

    if (item) {
        document.getElementById('res-id').innerText = item["Rotable ID"] || id;
        document.getElementById('res-pn').innerText = item["Part Number"] || "-";
        document.getElementById('res-sn').innerText = item["Serial No"] || "-";
        document.getElementById('res-loc').innerText = item["Location"] || "-";
        document.getElementById('res-store').innerText = item["Store"] || "-";
        document.getElementById('res-owner').innerText = item["Owner"] || "-";
        document.getElementById('res-project').innerText = item["Project No"] || "-";
        
        // 處理日期顯示
        const expiry = item["Expiry Date"];
        const expiryEl = document.getElementById('res-expiry');
        expiryEl.innerText = expiry ? new Date(expiry).toLocaleDateString() : "-";
        
        // 顯示結果，隱藏相機
        document.getElementById('reader').style.display = 'none';
        document.getElementById('result-card').style.display = 'block';
    } else {
        alert("找不到此編號: " + id + "\n請確認 Google Sheet 中是否存在此 Rotable ID。");
        restartScan();
    }
}

function restartScan() {
    // 重新整理頁面以重啟掃描器
    location.reload();
}

// 初始化掃描器
let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
    fps: 15, 
    qrbox: {width: 250, height: 250},
    aspectRatio: 1.0
});

html5QrcodeScanner.render(onScanSuccess);

// 執行資料載入
loadData();
</script>

</body>
</html>
