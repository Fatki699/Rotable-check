<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tool ID Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #007aff; --success: #34c759; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 15px; }
        
        /* 狀態顯示 */
        #status-bar { 
            text-align: center; padding: 14px; border-radius: 12px; margin-bottom: 15px; 
            font-weight: bold; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }
        .loading { border: 2px solid #8e8e93; color: #8e8e93; }
        .success { border: 2px solid var(--success); color: var(--success); }
        .error { border: 2px solid var(--danger); color: var(--danger); cursor: pointer; }

        /* 掃描區域 */
        #reader-wrapper { background: #000; border-radius: 20px; overflow: hidden; position: relative; width: 100%; min-height: 250px; }
        
        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; color: white; cursor: pointer; font-size: 16px; }
        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--success); }
        
        .input-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; }

        /* 結果顯示 */
        #result-card { display: none; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .res-header { color: var(--primary); font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #f2f2f7; padding-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .label { color: #888; font-size: 0.9rem; }
        .value { font-weight: bold; text-align: right; }
    </style>
</head>
<body>

<div id="status-bar" class="loading" onclick="fetchData()">🔄 正在同步庫存數據...</div>

<div id="main-ui">
    <div id="reader-wrapper"><div id="reader"></div></div>
    
    <div class="controls">
        <label class="btn btn-blue" style="text-align:center;">
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this)">
            📷 上傳相簿圖片辨識
        </label>
        
        <div class="input-group">
            <input type="text" id="manual-id" placeholder="輸入 Rotable ID 或序號">
            <button class="btn btn-green" onclick="search(document.getElementById('manual-id').value)">查詢</button>
        </div>
    </div>
</div>

<div id="result-card">
    <div class="res-header" id="res-id"></div>
    <div id="info-list"></div>
    <button class="btn btn-blue" style="width:100%; margin-top:20px;" onclick="reset()">重新掃描</button>
</div>

<script>
// --- 使用您的檔案 ID 進行強制導出 ---
const SPREADSHEET_ID = "1nQkJu1Sl9Hi66QdVY8XqeZXG7yhgDKM5dlxb0lL4Zd4";
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

let inventory = [];
let html5QrCode = new Html5Qrcode("reader");

// 1. 抓取資料
async function fetchData() {
    updateStatus("🔄 同步中...", "loading");
    try {
        const response = await fetch(DATA_URL + "&cachebust=" + Date.now());
        const csvText = await response.text();
        Papa.parse(csvText, {
            header: true,
            skipEmptyLines: true,
            complete: (results) => {
                inventory = results.data;
                updateStatus(`✅ 系統就緒 (${inventory.length} 筆庫存)`, "success");
            }
        });
    } catch (e) {
        updateStatus("❌ 連線失敗 (點此重試)", "error");
    }
}

function updateStatus(msg, cls) {
    const b = document.getElementById('status-bar');
    b.innerText = msg; b.className = cls;
}

// 2. 搜尋與顯示
function search(id) {
    if (!id) return;
    const target = id.trim().toUpperCase();
    
    // 全欄位比對 (搜尋 Rotable ID, Part Number, Serial Number 等)
    const item = inventory.find(row => 
        Object.values(row).some(v => String(v).trim().toUpperCase() === target)
    );

    if (item) {
        if (navigator.vibrate) navigator.vibrate(50);
        html5QrCode.stop().catch(()=>{});
        
        document.getElementById('res-id').innerText = target;
        document.getElementById('info-list').innerHTML = Object.entries(item).map(([k,v]) => `
            <div class="info-row"><span class="label">${k}</span><span class="value">${v || "-"}</span></div>
        `).join('');
        
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('result-card').style.display = 'block';
    } else {
        alert("找不到資料：" + target);
    }
}

// 3. 圖片處理
function handleFile(input) {
    if (input.files.length === 0) return;
    updateStatus("⌛ 辨識中...", "loading");
    html5QrCode.scanFile(input.files[0], true)
        .then(res => search(res))
        .catch(() => {
            updateStatus("❌ 辨識失敗", "error");
            alert("無法讀取條碼，請確保圖片清晰");
        });
}

// 4. 相機控制
function startCamera() {
    html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (res) => search(res))
    .catch(() => updateStatus("📷 相機啟動失敗", "error"));
}

function reset() {
    document.getElementById('result-card').style.display = 'none';
    document.getElementById('main-ui').style.display = 'block';
    startCamera();
}

// 啟動
fetchData();
startCamera();
</script>
</body>
</html>
