<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rotable Scanner Debug</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        #status-bar { text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; background: #fff; border: 1px solid #ccc; }
        #reader { background: #000; border-radius: 12px; overflow: hidden; }
        #result-card { display: none; background: white; padding: 20px; border-radius: 16px; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .label { color: #888; }
        .value { font-weight: bold; color: #000; }
        button { width: 100%; padding: 15px; background: #007aff; color: white; border: none; border-radius: 10px; font-size: 1rem; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="status-bar">正在載入試算表...</div>
    <div id="reader"></div>
    <div id="result-card">
        <h2 id="res-id" style="color:#007aff; margin:0 0 10px 0;"></h2>
        <div id="details"></div>
        <button onclick="location.reload()">重新掃描</button>
    </div>
</div>

<script>
// 使用你提供的 CSV 網址
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXRUvH5sxOhyAX7MNM7R7WqmdfGOkbBHeCRclGPZLyU17t7MJgQy7ctwAOR-tNH59SoEzib_I-9uwP/pub?output=csv";

let inventory = [];

function loadData() {
    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            inventory = results.data;
            const bar = document.getElementById('status-bar');
            if (inventory.length > 0) {
                bar.innerText = `✅ 同步成功 (${inventory.length} 筆)`;
                bar.style.color = "green";
                console.log("資料預覽:", inventory[0]); // 調試用
            } else {
                bar.innerText = "⚠️ 抓到 0 筆資料，請檢查試算表內容";
                bar.style.color = "orange";
            }
        },
        error: function(err) {
            document.getElementById('status-bar').innerText = "❌ 讀取失敗，請確認網路或連結";
            document.getElementById('status-bar').style.color = "red";
        }
    });
}

function onScanSuccess(decodedText) {
    html5QrcodeScanner.clear();
    const id = decodedText.trim().toUpperCase();
    
    // 遍歷所有欄位來比對 ID (防止標題名稱不匹配的問題)
    const item = inventory.find(row => {
        return Object.values(row).some(val => String(val).trim().toUpperCase() === id);
    });

    if (item) {
        document.getElementById('res-id').innerText = "編號: " + id;
        const detailsDiv = document.getElementById('details');
        detailsDiv.innerHTML = ""; // 清空舊內容

        // 自動把這行資料的所有欄位都列出來
        for (let key in item) {
            if (item[key]) {
                detailsDiv.innerHTML += `
                    <div class="info-row">
                        <span class="label">${key}</span>
                        <span class="value">${item[key]}</span>
                    </div>`;
            }
        }

        document.getElementById('reader').style.display = 'none';
        document.getElementById('result-card').style.display = 'block';
    } else {
        alert("找不到資料: " + id);
        location.reload();
    }
}

let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
html5QrcodeScanner.render(onScanSuccess);
loadData();
</script>

</body>
</html>
